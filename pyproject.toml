[project]
name = "biometric-face-preprocessor"
version = "0.1.0"
description = "Пайплайн предобработки видео для НПБК по ГОСТ Р 52633"
authors = [{ name = "KuznetsovMR", email = "marselkuznetsov@yandex.ru" }]
requires-python = ">=3.9"
dependencies = [
    "opencv-python>=4.8",
    "numpy>=1.24",
    "mediapipe>=0.10",
]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
