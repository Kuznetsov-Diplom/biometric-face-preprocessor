stages:
  - build
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  GIT_DEPTH: 0

cache:
  paths:
    - .pip-cache/

default:
  image: python:3.12

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install build twine "setuptools_scm[toml]>=7.0"
  - git fetch --tags --force || true
  - echo "=== Git tags ==="
  - git tag --list -l
  - echo "=== setuptools_scm detected version ==="
  - python -m setuptools_scm

build:
  stage: build
  script:
    - python -m build
    - echo "=== Содержимое dist/ ==="
    - ls -la dist/
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

publish:
  stage: publish
  script:
    - echo "=== Загружаем ==="
    - ls -l dist/
    - TWINE_USERNAME=gitlab-ci-token
      TWINE_PASSWORD=${CI_JOB_TOKEN}
      python -m twine upload --verbose --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*
  rules:
    - if: $CI_COMMIT_TAG