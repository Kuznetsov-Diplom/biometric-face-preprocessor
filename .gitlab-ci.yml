stages:
  - build
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

default:
  image: python:3.12

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install build twine

build:
  stage: build
  script:
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# Публикуем пакет в GitLab Package Registry ТОЛЬКО при создании тега (рекомендуемый способ)
publish:
  stage: publish
  script:
    - TWINE_USERNAME=gitlab-ci-token
      TWINE_PASSWORD=${CI_JOB_TOKEN}
      python -m twine upload --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*
  rules:
    - if: $CI_COMMIT_TAG